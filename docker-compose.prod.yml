services:
  app:
    build:
      context: .
      target: production
    container_name: acquisitions-prod
    ports:
      - '${PORT:-3000}:3000'
    env_file: -.env.production
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
