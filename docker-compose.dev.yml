services:
  neon-local:
    image: neondatabase/neon_local:latest
    container_name: neon-local
    ports:
      - "5432:5432"
    env_file:
      - .env.development
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neon -h localhost -p 5432 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  app:
    build:
      context: .
      target: development
    container_name: acquisitions-dev
    ports:
      - "${PORT:-3000}:3000"
    env_file: .env.development
    depends_on:
      neon-local:
        condition: service_healthy
    volumes:
      # - - .:/app
      # - /app/node_modules // this should be here to enable hot reload
      - ./src:/app/src
      - ./drizzle:/app/drizzle
    # environment:          // for enable hot reload
    #   - CHOKIDAR_USEPOLLING=true
